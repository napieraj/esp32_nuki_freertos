esphome:
  name: nuki-bridge

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

ethernet:
  type: W5500
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13
  cs_pin: GPIO10
  interrupt_pin: GPIO9
  reset_pin: GPIO14

api:

logger:

external_components:
  - source:
      type: local
      path: components

lock:
  - platform: nuki_pro
    name: "Front Door Nuki 5.0"
    pin: "065432"
    nuki_id: 2020002
    keepalive: true
    poll_interval: 100ms
